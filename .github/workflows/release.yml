name: "Release artifacts"

on:
  release:
    types:
      - created
  workflow_dispatch:
    inputs:
      version:
        description: "Image tag for manual runs (e.g. v0.8.0-debank-5)"
        required: true
      ref:
        description: "Git ref to build (tag/branch/sha); empty = the dispatched ref"
        required: false
        default: ""

env:
  AWS_REGION: us-east-1
  REGISTRY: public.ecr.aws/b2h7a5c4/chaintable
  IMAGE: nitro
  DOCKERFILE: Dockerfile
  CHAINS: "arbitrum gravity plume robinhood"

jobs:
  build-artifacts:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: tibdex/github-app-token@v1
        id: generate-token
        with:
          clean: true
          app_id: ${{ secrets.RELEASE_MANAGER_APP_ID }}
          private_key: ${{ secrets.RELEASE_MANAGER_APP_SECRET }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
          submodules: recursive
          token: ${{ steps.generate-token.outputs.token }}

      - name: Set env
        run: |
          REVISION="${{ github.event.inputs.version }}"
          [ -z "$REVISION" ] && REVISION=${GITHUB_REF#refs/*/}
          echo "REVISION=$REVISION" >> $GITHUB_ENV

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          file: ${{ env.DOCKERFILE }}
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ matrix.arch }}-${{ env.REVISION }}
          build-args: ACCESS_TOKEN=${{ steps.generate-token.outputs.token }}
          provenance: false

  merge-docker-manifest:
    runs-on: ubuntu-latest
    needs: build-artifacts
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          swap-storage: false

      - name: Checkout code
        uses: actions/checkout@v2
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
      - name: Set env
        run: |
          REVISION="${{ github.event.inputs.version }}"
          [ -z "$REVISION" ] && REVISION=${GITHUB_REF#refs/*/}
          echo "REVISION=$REVISION" >> $GITHUB_ENV
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Merge manifest and alias per-chain writers
        run: |
          # repo 级 multi-arch manifest + latest
          docker buildx imagetools create --tag ${REGISTRY}/${IMAGE}:${REVISION} --tag ${REGISTRY}/${IMAGE}:latest ${REGISTRY}/${IMAGE}:amd64-${REVISION} ${REGISTRY}/${IMAGE}:arm64-${REVISION}
          # 各链 writer 别名(同 digest,多名) + latest
          for c in ${CHAINS}; do
            docker buildx imagetools create --tag ${REGISTRY}/${c}-writer:${REVISION} --tag ${REGISTRY}/${c}-writer:latest ${REGISTRY}/${IMAGE}:${REVISION}
          done
