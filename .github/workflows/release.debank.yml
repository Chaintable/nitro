name: "Release artifacts"

on:
  release:
    types:
      - created
  workflow_dispatch:
    inputs:
      version:
        description: "Image tag for manual runs (e.g. v0.8.0-debank-5)"
        required: true
      ref:
        description: "Git ref to build (tag/branch/sha); empty = the dispatched ref"
        required: false
        default: ""

env:
  AWS_REGION: us-east-1
  REGISTRY: public.ecr.aws/b2h7a5c4/chaintable
  IMAGE: nitro
  DOCKERFILE: Dockerfile
  CHAINS: "arbitrum gravity plume robinhood"

jobs:
  build-artifacts:
    strategy:
      matrix:
        arch: [ amd64, arm64 ]
    runs-on: [self-hosted, "${{ matrix.arch }}"]
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
          submodules: recursive

      - name: Set env
        run: |
          REVISION="${{ github.event.inputs.version }}"
          [ -z "$REVISION" ] && REVISION=${GITHUB_REF#refs/*/}
          echo "REVISION=$REVISION" >> $GITHUB_ENV

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          file: ${{ env.DOCKERFILE }}
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ matrix.arch }}-${{ env.REVISION }}
          provenance: false

  merge-docker-manifest:
    runs-on: [self-hosted, general]
    needs: build-artifacts
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
      - name: Set env
        run: |
          REVISION="${{ github.event.inputs.version }}"
          [ -z "$REVISION" ] && REVISION=${GITHUB_REF#refs/*/}
          echo "REVISION=$REVISION" >> $GITHUB_ENV
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public
      - name: Merge manifest and alias per-chain writers
        run: |
          # repo 级 multi-arch manifest + latest
          docker buildx imagetools create --tag ${REGISTRY}/${IMAGE}:${REVISION} --tag ${REGISTRY}/${IMAGE}:latest ${REGISTRY}/${IMAGE}:amd64-${REVISION} ${REGISTRY}/${IMAGE}:arm64-${REVISION}
          # 各链 writer 别名(同 digest,多名) + latest
          for c in ${CHAINS}; do
            docker buildx imagetools create --tag ${REGISTRY}/${c}-writer:${REVISION} --tag ${REGISTRY}/${c}-writer:latest ${REGISTRY}/${IMAGE}:${REVISION}
          done
